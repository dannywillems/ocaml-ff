name: OCaml CI
on:
  pull_request:
    types: [assigned, opened, synchronize, reopened]
    branches:
      - master
  push:
    branches:
      - master
  merge_group:
    types: [checks_requested]

jobs:
  check-format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"
      - name: Install ocamlformat
        run: opam install ocamlformat.0.29.0
      - name: Check formatting
        run: opam exec -- dune fmt -- --check

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        ocaml-compiler:
          - "5.0"
          - "5.1"
          - "5.2"
          - "5.3"
          - "5.4"
    steps:
      - uses: actions/checkout@v6
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
      - name: Install dependencies
        run: opam install . --deps-only --with-test
      - name: Build
        run: opam exec -- dune build

  test:
    name: Test
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        ocaml-compiler:
          - "5.0"
          - "5.1"
          - "5.2"
          - "5.3"
          - "5.4"
    steps:
      - uses: actions/checkout@v6
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
      - name: Install dependencies
        run: opam install . --deps-only --with-test
      - name: Run tests
        run: opam exec -- dune runtest

  test-js:
    name: Test js_of_ocaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"
      - name: Install dependencies
        run: |
          opam install . --deps-only
          opam install js_of_ocaml js_of_ocaml-ppx \
            zarith_stubs_js
      - name: Include js directory in build
        run: echo '; empty' > dune
      - name: Build JS target
        run: opam exec -- dune build @js/runtest-js

  build-doc:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"
      - name: Install dependencies
        run: opam install . --deps-only --with-doc
      - name: Build documentation
        run: opam exec -- dune build @doc
